<div class="dropdown" appClickOutside (appClickOutside)="isDropdownOpen.set(false)">
  <button type="button" class="dropdown-trigger" (click)="toggleDropdown()" [disabled]="disabled()">
    @if (label()) {
    <span>{{ label() }}</span>
    }

    <strong>{{ selectedOption()?.label || placeholder() }}</strong>
    <i class="fa-solid fa-chevron-down" [class.open]="isDropdownOpen()"></i>
  </button>

  @if (isDropdownOpen()) {
  <div class="dropdown-menu">
    @for (option of options(); track option.value) {
    <button type="button" class="dropdown-row" (click)="selectOption(option)">
      {{ option.label }}
    </button>
    }
  </div>
  }
</div>
