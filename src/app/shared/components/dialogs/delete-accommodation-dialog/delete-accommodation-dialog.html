<div class="modal-window">
  <button type="button" class="modal-close" (click)="close()">
    <i class="fa-solid fa-xmark"></i>
  </button>

  <div class="modal-icon">
    <i class="fa-solid fa-trash"></i>
  </div>

  <h2>Delete accommodation?</h2>

  <p>
    Are you sure you want to delete this accommodation? This action cannot be undone.
  </p>

  @if (deleteErrorMessage()) {
  <div class="modal-error">
    {{ deleteErrorMessage() }}
  </div>
  }

  <div class="modal-actions">
    <button type="button" class="secondary-btn" (click)="close()" [disabled]="isDeleting()">
      No, keep it
    </button>

    <button type="button" class="danger-btn" (click)="deleteAccommodation()" [disabled]="isDeleting()">
      @if (isDeleting()) {
      Deleting...
      } @else {
      Yes, delete
      }
    </button>
  </div>
</div>
