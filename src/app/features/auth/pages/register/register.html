<div class="register-page">
  <div class="register-card">
    <h1>Create your account</h1>
  <p>You can sign in using your account to access our services.</p>

  <form class="form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email address" formControlName="email"
        [class.input-error]="registerForm.controls.email.invalid && registerForm.controls.email.touched">

      <div class="error-slot">
        @if(emailErrorMessage) {
        <p class="error-text">{{emailErrorMessage}}</p>
        }
        @if (serverError()) {
        <p class="error-text">{{ serverError() }}</p>
        }
      </div>
    </div>

    <div class="form-field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" formControlName="password"
        [class.input-error]="registerForm.controls.password.invalid && registerForm.controls.password.touched">

      <div class="error-slot">
        @if(passwordErrorMessage) {
        <p class="error-text">{{passwordErrorMessage}}</p>
        }
      </div>

    </div>

    <div class="form-field">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Enter your name" formControlName="name"
        [class.input-error]="registerForm.controls.name.invalid && registerForm.controls.name.touched">

      <div class="error-slot">
        @if(nameErrorMessage) {
        <p class="error-text">{{nameErrorMessage}}</p>
        }
      </div>

    </div>

    <button class="submit-btn" type="submit" [disabled]="registerForm.invalid || isLoading()">
      Create account
    </button>
  </form>
  </div>
</div>
