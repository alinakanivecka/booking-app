<section class="favorires-page">
  @if (favoritesService.favorites().length > 0) {
  <span class="saved-amount"><i class="fa-heart fa-solid"></i> {{totalItems()}} saved properties</span>
  }

  <section class="accommodation-list">
    <app-accommodations-list [isLoading]="isLoading()" [errorMessage]="errorMessage()"
      [accItems]="favoritesService.favorites()" [noResults]="noResults()" [isFavorite]="isFavorite"
      (toggleFavorite)="removeFavorite($event)" [emptyTitle]="'No saved accommodations yet'"
      [emptyState]="'favorites'"></app-accommodations-list>
  </section>
</section>
