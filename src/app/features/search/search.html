<app-search-panel [filters]="activeFilters()" (search)="onFilterChanged($event)"></app-search-panel>

@if (!hasSearched()) {
<section class="search-start">
  <div class="search-start-card">
    <i class="fa-solid fa-magnifying-glass-location"></i>

    <h2>Start your search</h2>
    <p>Enter a destination, dates and guests to discover the perfect place to stay.</p>
  </div>
</section>
} @else {
<main class="main">
  <app-filter-system class="desktop-only" [filters]="activeFilters()" [accItems]="accItems()"
    (filterChanged)="onFilterChanged($event)"></app-filter-system>

  <div class="main-wrap" #resultsSection>
    @if (getDestinationName()) {
    <h2 class="found-properties desktop-only">{{getDestinationName()}}: {{totalItems()}} properties found</h2>
    }

    <div class="filter-sort-wrap">
      <button class="filters mobile-only" type="button" (click)="openFilterSystem()">
        Filter
      </button>
      <app-sorting-system [sortOptions]="sortOptions" [selectedSort]="selectedSort()"
        (sortChanged)="selectSortMode($event)"></app-sorting-system>
    </div>

    <app-accommodations-list [isLoading]="isLoading()" [errorMessage]="errorMessage()" [accItems]="accItems()"
      [totalItems]="totalItems()" [noResults]="noResults()" [isFavorite]="isFavorite"
      (toggleFavorite)="toggleFavorite($event)" [emptyState]="'search'">
    </app-accommodations-list>
  </div>
</main>
}
